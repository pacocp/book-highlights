name: Sync highlights from Telegram

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install telethon

      - name: Decode session file
        env:
          TG_SESSION_B64: ${{ secrets.TG_SESSION_B64 }}
        run: |
          if [ -n "$TG_SESSION_B64" ]; then
            echo "$TG_SESSION_B64" | base64 -d > telegram_session.session
          fi

      - name: Run sync
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_PHONE: ${{ secrets.TG_PHONE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: python sync.py

      - name: Commit highlights
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add highlights.json
          git diff --cached --quiet || git commit -m "sync highlights from telegram"
          git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}
          git push
